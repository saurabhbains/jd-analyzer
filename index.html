<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Vault</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; color: #111827; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Storage ── */
const S = {
  load: () => { try { return JSON.parse(localStorage.getItem('rv2') || '{}'); } catch { return {}; } },
  save: d => localStorage.setItem('rv2', JSON.stringify(d)),
  get: k => S.load()[k],
  set: (k, v) => { const d = S.load(); d[k] = v; S.save(d); }
};

/* ── Helpers ── */
async function extractText(file) {
  const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
  return result.value;
}

async function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file);
  });
}

async function buildDocx(base64, changes) {
  const bin = atob(base64), buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  const zip = await JSZip.loadAsync(buf.buffer);
  let xml = await zip.file('word/document.xml').async('string');
  const failed = [];
  for (const c of changes.filter(c => c.approved)) {
    if (xml.includes(c.original)) xml = xml.split(c.original).join(c.replacement);
    else failed.push(c.location);
  }
  zip.file('word/document.xml', xml);
  const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  return { blob, failed };
}

async function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(blob);
  });
}

function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url);
}

function base64ToBlob(b64) {
  const bin = atob(b64), buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
}

async function callClaude(apiKey, resumeText, jdText) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: `You are a resume tailoring expert. Suggest 4-6 targeted text changes to improve this resume's match to the job description.

Return ONLY a valid JSON array — no markdown, no explanation. Each object must have:
{
  "id": 1,
  "location": "short label e.g. PayPay bullet 1",
  "original": "exact verbatim phrase from resume — keep it 5-10 words so it appears unbroken in the Word XML",
  "replacement": "improved version of that exact phrase",
  "reason": "one sentence explaining why this helps for the specific JD"
}

Rules:
- original must be verbatim text found in the resume, 5-10 words max
- Preserve sentence structure around the changed phrase
- Focus on high-impact keyword and framing changes only`,
      messages: [{ role: 'user', content: `JOB DESCRIPTION:\n${jdText}\n\nRESUME TEXT:\n${resumeText}` }]
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API error'); }
  const data = await res.json();
  const raw = data.content.find(b => b.type === 'text')?.text || '[]';
  return JSON.parse(raw.replace(/```json|```/g, '').trim()).map(c => ({ ...c, approved: true }));
}

/* ── Styles ── */
const st = {
  btn: (v = 'primary') => ({
    padding: '9px 16px', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: 'pointer', transition: 'opacity .15s',
    ...(v === 'primary' ? { background: '#111827', color: '#fff' } :
        v === 'ghost'   ? { background: '#fff', color: '#374151', border: '1px solid #e5e7eb' } :
        v === 'green'   ? { background: '#f0fdf4', color: '#15803d', border: '1px solid #bbf7d0' } :
        v === 'red'     ? { background: '#fef2f2', color: '#b91c1c', border: '1px solid #fecaca' } : {})
  }),
  inp: { width: '100%', padding: '10px 12px', border: '1px solid #e5e7eb', borderRadius: 8, fontSize: 13, outline: 'none', fontFamily: 'inherit', background: '#fff' },
  card: { background: '#fff', border: '1px solid #e5e7eb', borderRadius: 12, padding: '1.25rem' },
  lbl: { fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', color: '#9ca3af', marginBottom: 6, display: 'block' }
};

/* ── Login ── */
function Login({ onAuth }) {
  const hasPwd = !!S.get('pwd');
  const [mode] = useState(hasPwd ? 'login' : 'setup');
  const [pwd, setPwd] = useState(''), [confirm, setConfirm] = useState(''), [err, setErr] = useState('');

  const submit = () => {
    if (mode === 'setup') {
      if (pwd.length < 4) return setErr('Min 4 characters');
      if (pwd !== confirm) return setErr("Passwords don't match");
      S.set('pwd', pwd); onAuth();
    } else {
      if (pwd === S.get('pwd')) onAuth();
      else { setErr('Wrong password'); setPwd(''); }
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f9fafb' }}>
      <div style={{ ...st.card, width: 340, padding: '2rem' }}>
        <div style={{ textAlign: 'center', marginBottom: '1.5rem' }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📄</div>
          <h1 style={{ fontSize: 20, fontWeight: 700 }}>Resume Vault</h1>
          <p style={{ fontSize: 13, color: '#6b7280', marginTop: 4 }}>{mode === 'setup' ? 'Create a password to get started' : 'Sign in to continue'}</p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <input type="password" placeholder="Password" value={pwd} onChange={e => { setPwd(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && submit()} style={st.inp} autoFocus />
          {mode === 'setup' && <input type="password" placeholder="Confirm password" value={confirm} onChange={e => { setConfirm(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && submit()} style={st.inp} />}
          {err && <p style={{ fontSize: 12, color: '#dc2626' }}>{err}</p>}
          <button onClick={submit} style={{ ...st.btn('primary'), padding: 12 }}>{mode === 'setup' ? 'Create Password' : 'Sign In'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── API Key Input ── */
function ApiKeyInput({ current, onSave, onCancel }) {
  const [val, setVal] = useState(current);
  return (
    <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
      <input type="password" placeholder="sk-ant-..." value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && onSave(val)} style={{ ...st.inp, width: 200, padding: '6px 10px' }} autoFocus />
      <button onClick={() => onSave(val)} style={{ ...st.btn('primary'), padding: '6px 12px' }}>Save</button>
      <button onClick={onCancel} style={{ ...st.btn('ghost'), padding: '6px 10px' }}>✕</button>
    </div>
  );
}

/* ── Analyze Tab ── */
function AnalyzeTab({ apiKey, onAddToVault }) {
  const [step, setStep] = useState(0);
  const [file, setFile] = useState(null);
  const [jd, setJd] = useState('');
  const [resumeText, setResumeText] = useState('');
  const [b64, setB64] = useState('');
  const [changes, setChanges] = useState([]);
  const [err, setErr] = useState('');
  const [resultBlob, setResultBlob] = useState(null);
  const [failedChanges, setFailedChanges] = useState([]);
  const [savedName, setSavedName] = useState('');
  const [customName, setCustomName] = useState('');
  const fileRef = useRef();

  const handleFile = async f => {
    if (!f?.name.endsWith('.docx')) return setErr('Please upload a .docx file');
    setFile(f); setErr('');
    const [text, base64] = await Promise.all([extractText(f), toBase64(f)]);
    setResumeText(text); setB64(base64);
  };

  const handleAnalyze = async () => {
    if (!file) return setErr('Upload a .docx resume first');
    if (!jd.trim()) return setErr('Paste a job description first');
    if (!apiKey) return setErr('Set your API key (top right) first');
    setStep(1); setErr('');
    try {
      const result = await callClaude(apiKey, resumeText, jd);
      setChanges(result); setStep(2);
    } catch (e) { setErr(e.message); setStep(0); }
  };

  const handleGenerate = async () => {
    const approved = changes.filter(c => c.approved);
    if (!approved.length) return setErr('Approve at least one change');
    setStep(1);
    try {
      const { blob, failed } = await buildDocx(b64, changes);
      const name = customName.trim() || (file.name.replace('.docx','') + '_tailored_' + new Date().toISOString().slice(0,10));
      const newB64 = await blobToBase64(blob);
      let updatedText = resumeText;
      for (const c of approved) updatedText = updatedText.split(c.original).join(c.replacement);
      onAddToVault({ id: Date.now().toString(), name, text: updatedText, base64: newB64, addedAt: new Date().toISOString() });
      setResultBlob(blob); setFailedChanges(failed); setSavedName(name); setStep(3);
    } catch (e) { setErr(e.message); setStep(2); }
  };

  const reset = () => { setStep(0); setFile(null); setJd(''); setResumeText(''); setB64(''); setChanges([]); setErr(''); setResultBlob(null); setFailedChanges([]); setSavedName(''); setCustomName(''); };

  if (step === 1) return (
    <div style={{ textAlign: 'center', padding: '5rem 0' }}>
      <div style={{ fontSize: 32, marginBottom: 16 }}><span className="spin">⚙️</span></div>
      <p style={{ color: '#6b7280', fontSize: 14 }}>Analysing your resume against the JD...</p>
    </div>
  );

  if (step === 3) return (
    <div style={{ ...st.card, textAlign: 'center', padding: '2.5rem' }}>
      <div style={{ fontSize: 44, marginBottom: 12 }}>✅</div>
      <h3 style={{ fontSize: 17, fontWeight: 600, marginBottom: 6 }}>Resume ready</h3>
      <p style={{ fontSize: 13, color: '#6b7280', marginBottom: 4 }}>Auto-saved to vault as <strong>{savedName}</strong></p>
      {failedChanges.length > 0 && (
        <div style={{ background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 8, padding: '10px 14px', margin: '12px 0', fontSize: 12, color: '#92400e', textAlign: 'left' }}>
          ⚠️ {failedChanges.length} change(s) couldn't be auto-applied (run-split in XML): <strong>{failedChanges.join(', ')}</strong>. Apply these manually in Word.
        </div>
      )}
      <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: '1.5rem' }}>
        <button onClick={() => dlBlob(resultBlob, savedName + '.docx')} style={{ ...st.btn('primary'), padding: '10px 20px' }}>⬇ Download .docx</button>
        <button onClick={reset} style={st.btn('ghost')}>Start over</button>
      </div>
    </div>
  );

  if (step === 2) return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
        <h3 style={{ fontSize: 15, fontWeight: 600 }}>Suggested changes</h3>
        <button onClick={reset} style={{ ...st.btn('ghost'), fontSize: 12, padding: '6px 12px' }}>← Start over</button>
      </div>
      <p style={{ fontSize: 13, color: '#6b7280', marginBottom: '1rem' }}>Toggle to approve or reject each change. Approved changes will be applied to the .docx.</p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: '1.25rem' }}>
        {changes.map((c, i) => (
          <div key={c.id} style={{ ...st.card, borderLeft: `3px solid ${c.approved ? '#16a34a' : '#d1d5db'}`, transition: 'border-color .2s' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.05em', color: '#9ca3af', paddingTop: 2 }}>{c.location}</span>
              <button onClick={() => setChanges(prev => prev.map((ch, j) => j === i ? { ...ch, approved: !ch.approved } : ch))}
                style={{ ...st.btn(c.approved ? 'green' : 'ghost'), padding: '4px 12px', fontSize: 12, flexShrink: 0 }}>
                {c.approved ? '✓ Approved' : 'Rejected'}
              </button>
            </div>
            <div style={{ fontSize: 13, color: '#9ca3af', textDecoration: 'line-through', marginBottom: 5 }}>{c.original}</div>
            <div style={{ fontSize: 13, color: '#15803d', marginBottom: 8 }}>→ {c.replacement}</div>
            <div style={{ fontSize: 12, color: '#6b7280', borderTop: '1px solid #f3f4f6', paddingTop: 8 }}>{c.reason}</div>
          </div>
        ))}
      </div>

      <div style={{ marginBottom: 10 }}>
        <span style={st.lbl}>Resume name (optional)</span>
        <input value={customName} onChange={e => setCustomName(e.target.value)} placeholder={file?.name.replace('.docx','') + '_tailored_' + new Date().toISOString().slice(0,10)} style={st.inp} />
      </div>

      {err && <p style={{ fontSize: 13, color: '#dc2626', marginBottom: 10 }}>{err}</p>}
      <button onClick={handleGenerate} style={{ ...st.btn('primary'), width: '100%', padding: 12, fontSize: 14 }}>
        Generate tailored .docx →
      </button>
    </div>
  );

  /* Step 0: Upload */
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
      <div>
        <span style={st.lbl}>1 · Upload your resume (.docx)</span>
        <div onClick={() => fileRef.current.click()} onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }} onDragOver={e => e.preventDefault()}
          style={{ border: `2px dashed ${file ? '#86efac' : '#e5e7eb'}`, borderRadius: 10, padding: '1.5rem', textAlign: 'center', cursor: 'pointer', background: file ? '#f0fdf4' : '#fafafa', transition: 'all .2s' }}>
          {file
            ? <p style={{ fontSize: 14, color: '#15803d', fontWeight: 500 }}>✓ {file.name}</p>
            : <><p style={{ fontSize: 14, color: '#6b7280' }}>Drop .docx here or click to browse</p><p style={{ fontSize: 12, color: '#9ca3af', marginTop: 4 }}>Format is preserved exactly</p></>
          }
          <input ref={fileRef} type="file" accept=".docx" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
        </div>
      </div>

      <div>
        <span style={st.lbl}>2 · Paste job description</span>
        <textarea value={jd} onChange={e => setJd(e.target.value)} placeholder="Paste the full job description here..." style={{ ...st.inp, height: 200, resize: 'vertical', lineHeight: 1.6 }} />
      </div>

      {err && <p style={{ fontSize: 13, color: '#dc2626' }}>{err}</p>}

      <button onClick={handleAnalyze} style={{ ...st.btn('primary'), padding: '12px 20px', fontSize: 14 }}>
        Analyse &amp; suggest changes →
      </button>
    </div>
  );
}

/* ── Vault Tab ── */
function VaultTab({ vault, onRemove, onAddToVault }) {
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();

  const handleUpload = async f => {
    if (!f?.name.endsWith('.docx')) return;
    setUploading(true);
    const [text, base64] = await Promise.all([extractText(f), toBase64(f)]);
    onAddToVault({ id: Date.now().toString(), name: f.name.replace('.docx',''), text, base64, addedAt: new Date().toISOString() });
    setUploading(false);
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
        <h3 style={{ fontSize: 15, fontWeight: 600 }}>{vault.length} resume{vault.length !== 1 ? 's' : ''} in vault</h3>
        <button onClick={() => fileRef.current.click()} style={st.btn('ghost')}>
          {uploading ? '⏳ Uploading...' : '+ Add resume'}
        </button>
        <input ref={fileRef} type="file" accept=".docx" style={{ display: 'none' }} onChange={e => handleUpload(e.target.files[0])} />
      </div>

      {vault.length === 0 ? (
        <div style={{ ...st.card, textAlign: 'center', padding: '3rem', color: '#9ca3af' }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>🗂️</div>
          <p style={{ fontSize: 14 }}>No resumes yet.</p>
          <p style={{ fontSize: 13, marginTop: 4 }}>Analyse a JD to auto-add tailored versions, or upload manually above.</p>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {vault.map(r => (
            <div key={r.id} style={{ ...st.card, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 14, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.name}</p>
                <p style={{ fontSize: 12, color: '#9ca3af', marginTop: 2 }}>{new Date(r.addedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</p>
              </div>
              <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
                <button onClick={() => dlBlob(base64ToBlob(r.base64), r.name + '.docx')} style={{ ...st.btn('ghost'), padding: '6px 12px', fontSize: 12 }}>⬇ .docx</button>
                <button onClick={() => onRemove(r.id)} style={{ ...st.btn('red'), padding: '6px 10px', fontSize: 12 }}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Main App ── */
function MainApp() {
  const [tab, setTab] = useState('analyze');
  const [apiKey, setApiKey] = useState(() => S.get('apiKey') || '');
  const [showApiInput, setShowApiInput] = useState(false);
  const [vault, setVault] = useState(() => S.get('vault') || []);
  const [authed, setAuthed] = useState(false);

  const saveApiKey = k => { setApiKey(k); S.set('apiKey', k); setShowApiInput(false); };
  const addToVault = entry => { const v = [entry, ...vault]; setVault(v); S.set('vault', v); };
  const removeFromVault = id => { const v = vault.filter(r => r.id !== id); setVault(v); S.set('vault', v); };

  if (!authed) return <Login onAuth={() => setAuthed(true)} />;

  return (
    <div style={{ minHeight: '100vh', background: '#f3f4f6' }}>
      {/* Header */}
      <div style={{ background: '#fff', borderBottom: '1px solid #e5e7eb' }}>
        <div style={{ maxWidth: 780, margin: '0 auto', padding: '0 1.5rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 58 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <span style={{ fontSize: 20 }}>📄</span>
            <span style={{ fontWeight: 700, fontSize: 15, letterSpacing: '-.01em' }}>Resume Vault</span>
            <div style={{ display: 'flex', marginLeft: 8 }}>
              {[['analyze','Analyse'], ['vault', `Vault (${vault.length})`]].map(([t, label]) => (
                <button key={t} onClick={() => setTab(t)}
                  style={{ padding: '0 14px', height: 58, fontSize: 13, fontWeight: tab === t ? 600 : 400, color: tab === t ? '#111827' : '#6b7280', background: 'none', border: 'none', cursor: 'pointer', borderBottom: tab === t ? '2px solid #111827' : '2px solid transparent' }}>
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {showApiInput
              ? <ApiKeyInput current={apiKey} onSave={saveApiKey} onCancel={() => setShowApiInput(false)} />
              : <button onClick={() => setShowApiInput(true)} style={{ ...st.btn('ghost'), fontSize: 12, padding: '6px 12px' }}>
                  {apiKey ? '🔑 Key set ✓' : '🔑 Set API key'}
                </button>
            }
            <button onClick={() => setAuthed(false)} style={{ ...st.btn('ghost'), fontSize: 12, padding: '6px 12px' }}>Sign out</button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 780, margin: '0 auto', padding: '1.5rem' }}>
        {tab === 'analyze'
          ? <AnalyzeTab apiKey={apiKey} onAddToVault={addToVault} />
          : <VaultTab vault={vault} onRemove={removeFromVault} onAddToVault={addToVault} />
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
</script>
</body>
</html>
