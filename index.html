/* ── Storage ── */
function hashPwd(pwd) {
  let h = 0;
  for (let i = 0; i < pwd.length; i++) h = (Math.imul(31, h) + pwd.charCodeAt(i)) | 0;
  return 'rv_' + Math.abs(h).toString(36);
}
const S = {
  getAll: key => { try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch { return {}; } },
  setAll: (key, d) => localStorage.setItem(key, JSON.stringify(d)),
  get: (key, field) => S.getAll(key)[field],
  set: (key, field, val) => { const d = S.getAll(key); d[field] = val; S.setAll(key, d); }
};

/* ── Helpers ── */
async function extractText(file) {
  const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
  return result.value;
}
async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file);
  });
}
async function buildDocx(base64, changes) {
  const bin = atob(base64), buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  const zip = await JSZip.loadAsync(buf.buffer);
  let xml = await zip.file('word/document.xml').async('string');
  const failed = [];
  for (const c of changes.filter(c => c.approved)) {
    if (xml.includes(c.original)) xml = xml.split(c.original).join(c.replacement);
    else failed.push(c.location);
  }
  zip.file('word/document.xml', xml);
  const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  return { blob, failed };
}
async function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(blob);
  });
}
function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url);
}
function base64ToBlob(b64) {
  const bin = atob(b64), buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
}
async function callClaude(apiKey, resumeText, jdText) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514', max_tokens: 2000,
      system: `You are a resume tailoring expert. Suggest 4-6 targeted text changes to improve this resume's match to the job description.
Return ONLY a valid JSON array — no markdown, no explanation. Each object:
{ "id": 1, "location": "short label e.g. PayPay bullet 1", "original": "exact verbatim phrase from resume — 5-10 words, unbroken in Word XML", "replacement": "improved version of that exact phrase", "reason": "one sentence why this helps for this specific JD" }
Rules: original must be verbatim text found in the resume, 5-10 words max. Focus on high-impact keyword and framing changes only.`,
      messages: [{ role: 'user', content: `JOB DESCRIPTION:\n${jdText}\n\nRESUME TEXT:\n${resumeText}` }]
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API error'); }
  const data = await res.json();
  const raw = data.content.find(b => b.type === 'text')?.text || '[]';
  return JSON.parse(raw.replace(/```json|```/g, '').trim()).map(c => ({ ...c, approved: true }));
}

          <input type="password" placeholder="Password" value={pwd} onChange={e => { setPwd(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && submit()} style={st.inp} autoFocus />
          {mode === 'setup' && <input type="password" placeholder="Confirm password" value={confirm} onChange={e => { setConfirm(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && submit()} style={st.inp} />}

        Your resumes are stored locally in your browser — never uploaded to any server.
      </p>
    </div>
  );
}

/* ── Resume Picker ── */
function ResumePicker({ vault, onSelect, onUpload }) {
  const fileRef = useRef();
  const [uploading, setUploading] = useState(false);

  const handleFile = async f => {
    if (!f?.name.endsWith('.docx')) return;
    setUploading(true);
    const [text, base64] = await Promise.all([extractText(f), fileToBase64(f)]);
    const entry = { id: Date.now().toString(), name: f.name.replace('.docx',''), text, base64, addedAt: new Date().toISOString() };
    onUpload(entry); onSelect(entry); setUploading(false);
  };

  return (
    <div>
      <span style={st.lbl}>1 · Choose resume</span>
      {vault.length > 0 ? (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 10 }}>
          {vault.map(r => (
            <button key={r.id} onClick={() => onSelect(r)}
              style={{ ...st.btn('ghost'), textAlign: 'left', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 16 }}>📄</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{r.name}</div>
                <div style={{ fontSize: 11, color: '#9ca3af' }}>Added {new Date(r.addedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
              </div>
            </button>
          ))}
        </div>
      ) : (
        <p style={{ fontSize: 13, color: '#9ca3af', marginBottom: 8, padding: '8px 0' }}>No resumes in vault yet — upload one below to get started.</p>
      )}
      <button onClick={() => fileRef.current.click()} style={{ ...st.btn('ghost'), width: '100%', padding: '10px 14px', border: '2px dashed #e5e7eb', background: '#fafafa' }}>
        {uploading ? '⏳ Uploading...' : '+ Upload new .docx'}
      </button>
      <input ref={fileRef} type="file" accept=".docx" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
    </div>
  );
}

/* ── Analyze Tab ── */
function AnalyzeTab({ apiKey, vault, onAddToVault }) {
  const [step, setStep] = useState(0);
  const [selected, setSelected] = useState(null);
  const [jd, setJd] = useState('');
  const [changes, setChanges] = useState([]);
  const [err, setErr] = useState('');
  const [resultBlob, setResultBlob] = useState(null);
  const [failedChanges, setFailedChanges] = useState([]);
  const [savedName, setSavedName] = useState('');
  const [customName, setCustomName] = useState('');

  const handleAnalyze = async () => {
    if (!selected) return setErr('Select a resume first');
    if (!jd.trim()) return setErr('Paste a job description first');
    if (!apiKey) return setErr('Set your API key first (top right)');
    setStep(1); setErr('');
    try { const result = await callClaude(apiKey, selected.text, jd); setChanges(result); setStep(2); }
    catch (e) { setErr(e.message); setStep(0); }
  };

  const handleGenerate = async () => {
    if (!changes.filter(c => c.approved).length) return setErr('Approve at least one change');
    setStep(1);
    try {
      const { blob, failed } = await buildDocx(selected.base64, changes);
      const name = customName.trim() || (selected.name + '_tailored_' + new Date().toISOString().slice(0,10));
      const newB64 = await blobToBase64(blob);
      let updatedText = selected.text;
      changes.filter(c=>c.approved).forEach(c => { updatedText = updatedText.split(c.original).join(c.replacement); });
      onAddToVault({ id: Date.now().toString(), name, text: updatedText, base64: newB64, addedAt: new Date().toISOString() });
      setResultBlob(blob); setFailedChanges(failed); setSavedName(name); setStep(3);
    } catch (e) { setErr(e.message); setStep(2); }
  };

  const reset = () => { setStep(0); setSelected(null); setJd(''); setChanges([]); setErr(''); setResultBlob(null); setFailedChanges([]); setSavedName(''); setCustomName(''); };

  if (step === 1) return (
    <div style={{ textAlign: 'center', padding: '5rem 0' }}>
      <div style={{ fontSize: 32, marginBottom: 16 }}><span className="spin">⚙️</span></div>
      <p style={{ color: '#6b7280', fontSize: 14 }}>Analysing against the JD...</p>
    </div>
  );

  if (step === 3) return (
    <div style={{ ...st.card, textAlign: 'center', padding: '2.5rem' }} className="fade">
      <div style={{ fontSize: 44, marginBottom: 12 }}>✅</div>
      <h3 style={{ fontSize: 17, fontWeight: 600, marginBottom: 6 }}>Resume ready</h3>
      <p style={{ fontSize: 13, color: '#6b7280', marginBottom: 4 }}>Saved to vault as <strong>{savedName}</strong></p>
      {failedChanges.length > 0 && (
        <div style={{ background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 8, padding: '10px 14px', margin: '12px 0', fontSize: 12, color: '#92400e', textAlign: 'left' }}>
          ⚠️ {failedChanges.length} change(s) couldn't be auto-applied (Word XML run-split): <strong>{failedChanges.join(', ')}</strong>. Apply manually in Word.
        </div>
      )}
      <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: '1.5rem' }}>
        <button onClick={() => dlBlob(resultBlob, savedName + '.docx')} style={{ ...st.btn('primary'), padding: '10px 20px' }}>⬇ Download .docx</button>
        <button onClick={reset} style={st.btn('ghost')}>Start over</button>
      </div>
    </div>
  );

  if (step === 2) return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
        <h3 style={{ fontSize: 15, fontWeight: 600 }}>Suggested changes · <span style={{ color: '#6b7280', fontWeight: 400 }}>{selected.name}</span></h3>
        <button onClick={reset} style={{ ...st.btn('ghost'), fontSize: 12, padding: '6px 12px' }}>← Start over</button>
      </div>
      <p style={{ fontSize: 13, color: '#6b7280', marginBottom: '1rem' }}>Toggle to approve or reject. Approved changes are applied to the .docx preserving all formatting.</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: '1.25rem' }}>
        {changes.map((c, i) => (
          <ChangeCard key={c.id} c={c} index={i} onToggle={i => setChanges(prev => prev.map((ch, j) => j === i ? { ...ch, approved: !ch.approved } : ch))} />
        ))}
      </div>
      <div style={{ marginBottom: 10 }}>
        <span style={st.lbl}>Name for tailored resume (optional)</span>
        <input value={customName} onChange={e => setCustomName(e.target.value)} placeholder={selected.name + '_tailored_' + new Date().toISOString().slice(0,10)} style={st.inp} />
      </div>
      {err && <p style={{ fontSize: 13, color: '#dc2626', marginBottom: 10 }}>{err}</p>}
      <button onClick={handleGenerate} style={{ ...st.btn('primary'), width: '100%', padding: 12, fontSize: 14 }}>Generate tailored .docx →</button>
    </div>
  );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '1.25rem' }}>
      <ResumePicker vault={vault} onSelect={r => { setSelected(r); setErr(''); }} onUpload={onAddToVault} />
      {selected && (
        <div style={{ background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: 8, padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
          <span>✓</span>
          <span style={{ fontSize: 13, color: '#15803d', fontWeight: 500 }}>{selected.name} selected</span>
          <button onClick={() => setSelected(null)} style={{ marginLeft: 'auto', background: 'none', border: 'none', cursor: 'pointer', color: '#6b7280', fontSize: 16 }}>✕</button>
        </div>
      )}
      <div>
        <span style={st.lbl}>2 · Paste job description</span>
        <textarea value={jd} onChange={e => setJd(e.target.value)} placeholder="Paste the full job description here..." style={{ ...st.inp, height: 200, resize: 'vertical', lineHeight: 1.6 }} />
      </div>
      {err && <p style={{ fontSize: 13, color: '#dc2626' }}>{err}</p>}
      <button onClick={handleAnalyze} disabled={!selected || !jd.trim()} style={{ ...st.btn('primary'), padding: '12px 20px', fontSize: 14, opacity: (!selected || !jd.trim()) ? 0.4 : 1 }}>
        Analyse &amp; suggest changes →
      </button>
    </div>
  );
}

/* ── Vault Tab ── */
function VaultTab({ vault, onRemove, onAddToVault }) {
  const fileRef = useRef();
  const [uploading, setUploading] = useState(false);

  const handleUpload = async f => {
    if (!f?.name.endsWith('.docx')) return;
    setUploading(true);
    const [text, base64] = await Promise.all([extractText(f), fileToBase64(f)]);
    onAddToVault({ id: Date.now().toString(), name: f.name.replace('.docx',''), text, base64, addedAt: new Date().toISOString() });
    setUploading(false);
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
        <h3 style={{ fontSize: 15, fontWeight: 600 }}>{vault.length} resume{vault.length !== 1 ? 's' : ''} in vault</h3>
        <button onClick={() => fileRef.current.click()} style={st.btn('ghost')}>{uploading ? '⏳' : '+ Add resume'}</button>
        <input ref={fileRef} type="file" accept=".docx" style={{ display: 'none' }} onChange={e => handleUpload(e.target.files[0])} />
      </div>
      {vault.length === 0 ? (
        <div style={{ ...st.card, textAlign: 'center', padding: '3rem', color: '#9ca3af' }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>🗂️</div>
          <p style={{ fontSize: 14 }}>No resumes yet.</p>
          <p style={{ fontSize: 13, marginTop: 4 }}>Upload a .docx here, or generate a tailored version from the Analyse tab.</p>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {vault.map(r => (
            <div key={r.id} style={{ ...st.card, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 14, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.name}</p>
                <p style={{ fontSize: 12, color: '#9ca3af', marginTop: 2 }}>{new Date(r.addedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</p>
              </div>
              <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
                <button onClick={() => dlBlob(base64ToBlob(r.base64), r.name + '.docx')} style={{ ...st.btn('ghost'), padding: '6px 12px', fontSize: 12 }}>⬇ .docx</button>
                <button onClick={() => onRemove(r.id)} style={{ ...st.btn('red'), padding: '6px 10px', fontSize: 12 }}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [view, setView] = useState('login'); // login | demo | app
  const [tab, setTab] = useState('analyze');
  const [apiKey, setApiKey] = useState('');
  const [showApiInput, setShowApiInput] = useState(false);
  const [vault, setVault] = useState([]);
  const [storageKey, setStorageKey] = useState('');

  const handleAuth = pwd => {
    const key = hashPwd(pwd);
    setStorageKey(key);
    setVault(S.get(key, 'vault') || []);
    setApiKey(S.get(key, 'apiKey') || '');
    setView('app');
  };

  const saveApiKey = k => { setApiKey(k); S.set(storageKey, 'apiKey', k); setShowApiInput(false); };

  const addToVault = entry => {
    setVault(prev => { const v = [entry, ...prev]; if (storageKey) S.set(storageKey, 'vault', v); return v; });
  };

  const removeFromVault = id => {
    setVault(prev => { const v = prev.filter(r => r.id !== id); S.set(storageKey, 'vault', v); return v; });
  };

  if (view === 'login') return <Login onAuth={handleAuth} onDemo={() => setView('demo')} />;
  if (view === 'demo') return <DemoMode onExit={() => setView('login')} />;

  return (
    <div style={{ minHeight: '100vh', background: '#f3f4f6' }}>
      <div style={{ background: '#fff', borderBottom: '1px solid #e5e7eb' }}>
        <div style={{ maxWidth: 780, margin: '0 auto', padding: '0 1.5rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 58 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 20 }}>📄</span>
            <span style={{ fontWeight: 700, fontSize: 15, letterSpacing: '-.01em', marginRight: 8 }}>Resume Vault</span>
            {[['analyze','Analyse'], ['vault', `Vault (${vault.length})`]].map(([t, label]) => (
              <button key={t} onClick={() => setTab(t)}
                style={{ padding: '0 14px', height: 58, fontSize: 13, fontWeight: tab === t ? 600 : 400, color: tab === t ? '#111827' : '#6b7280', background: 'none', border: 'none', cursor: 'pointer', borderBottom: tab === t ? '2px solid #111827' : '2px solid transparent' }}>
                {label}
              </button>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {showApiInput ? (
              <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                <input type="password" placeholder="sk-ant-..." defaultValue={apiKey} id="apiInp" onKeyDown={e => e.key === 'Enter' && saveApiKey(document.getElementById('apiInp').value)} style={{ ...st.inp, width: 200, padding: '6px 10px' }} autoFocus />
                <button onClick={() => saveApiKey(document.getElementById('apiInp').value)} style={{ ...st.btn('primary'), padding: '6px 12px' }}>Save</button>
                <button onClick={() => setShowApiInput(false)} style={{ ...st.btn('ghost'), padding: '6px 10px' }}>✕</button>
              </div>
            ) : (
              <button onClick={() => setShowApiInput(true)} style={{ ...st.btn('ghost'), fontSize: 12, padding: '6px 12px' }}>
                {apiKey ? '🔑 Key set ✓' : '🔑 Set API key'}
              </button>
            )}
            <button onClick={() => { setView('login'); setVault([]); setApiKey(''); setStorageKey(''); }} style={{ ...st.btn('ghost'), fontSize: 12, padding: '6px 12px' }}>Sign out</button>
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 780, margin: '0 auto', padding: '1.5rem' }}>
        {tab === 'analyze'
          ? <AnalyzeTab apiKey={apiKey} vault={vault} onAddToVault={addToVault} />
          : <VaultTab vault={vault} onRemove={removeFromVault} onAddToVault={addToVault} />
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
